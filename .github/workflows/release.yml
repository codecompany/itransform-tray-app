name: Release PulseTray

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag (for example v0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: pulsetray-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  NPM_PACKAGE: "@code-company/pulsetray"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}
      - id: version
        shell: bash
        run: |
          set -euo pipefail
          [[ "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]
          echo "value=${RELEASE_TAG#v}" >> "${GITHUB_OUTPUT}"
      - shell: bash
        run: |
          set -euo pipefail
          ROOT_VERSION="$(node -p "require('./package.json').version")"
          [[ "${ROOT_VERSION}" == "${RELEASE_TAG#v}" ]] || {
            echo "package.json version ${ROOT_VERSION} does not match ${RELEASE_TAG}" >&2
            exit 1
          }

  build-macos:
    needs: prepare
    runs-on: macos-15-intel
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    env:
      CSC_LINK: ${{ secrets.CSC_LINK || secrets.APPLE_DEV_ID_P12_BASE64 }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD || secrets.APPLE_DEV_ID_P12_PASSWORD }}
      CSC_NAME: ${{ secrets.APPLE_SIGNING_IDENTITY || secrets.SIGNING_IDENTITY }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      NOTARY_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 || secrets.APPLE_NOTARY_API_KEY_BASE64 }}
      NOTARY_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID || secrets.APPLE_NOTARY_KEY_ID }}
      NOTARY_API_ISSUER: ${{ secrets.APPLE_API_ISSUER || secrets.APPLE_NOTARY_ISSUER_ID }}
      ELECTRON_CACHE: ~/Library/Caches/electron
      ELECTRON_BUILDER_CACHE: ~/Library/Caches/electron-builder
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: macos-${{ matrix.arch }}-electron-${{ hashFiles('package-lock.json') }}
      - run: npm ci --prefer-offline --no-audit
      - run: npm test -- --run
      - name: Build signed macOS artifacts
        run: bash scripts/build-release.sh --platform mac --arch ${{ matrix.arch }} --version ${{ needs.prepare.outputs.version }}
      - name: Verify signature when configured
        if: ${{ env.CSC_LINK != '' }}
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="$(find release -type d -name 'PulseTray.app' | head -n 1)"
          codesign --verify --deep --strict --verbose=2 "${APP_PATH}"
      - name: Notarize macOS artifacts when configured
        if: ${{ env.NOTARY_API_KEY_BASE64 != '' && env.NOTARY_API_KEY_ID != '' && env.NOTARY_API_ISSUER != '' }}
        env:
          APPLE_API_KEY_BASE64: ${{ env.NOTARY_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ env.NOTARY_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ env.NOTARY_API_ISSUER }}
        run: bash scripts/ci/notarize-macos-release.sh release/*.dmg release/*.zip
      - uses: actions/upload-artifact@v4
        with:
          name: pulsetray-macos-${{ matrix.arch }}
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error

  build-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: windows-x64-electron-${{ hashFiles('package-lock.json') }}
      - run: npm ci --prefer-offline --no-audit
      - name: Build Windows installer and portable app
        shell: bash
        run: bash scripts/build-release.sh --platform win --arch x64 --version ${{ needs.prepare.outputs.version }}
      - uses: actions/upload-artifact@v4
        with:
          name: pulsetray-windows-x64
          path: release/*.exe
          if-no-files-found: error

  publish-release:
    needs: [prepare, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: downloaded
      - name: Collect artifacts and checksums
        shell: bash
        run: |
          set -euo pipefail
          mkdir release-assets
          find downloaded -type f -exec cp {} release-assets/ \;
          (cd release-assets && sha256sum * > SHA256SUMS.txt)
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          gh release view "${RELEASE_TAG}" >/dev/null 2>&1 ||
            gh release create "${RELEASE_TAG}" --verify-tag --generate-notes --title "${RELEASE_TAG}"
          gh release upload "${RELEASE_TAG}" release-assets/* --clobber

  publish-npm:
    needs: [prepare, publish-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
          scope: "@code-company"
      - name: Pack and publish
        working-directory: npm-package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          [[ -n "${NODE_AUTH_TOKEN:-}" ]] || { echo "Missing NPM_TOKEN" >&2; exit 1; }
          npm version --no-git-tag-version --allow-same-version "${RELEASE_TAG#v}"
          npm pack --dry-run
          npm publish --access public --provenance

  smoke-npm:
    needs: [prepare, publish-npm]
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
          scope: "@code-company"
      - name: Wait for npm replication
        shell: bash
        run: |
          set -euo pipefail
          for attempt in {1..18}; do
            npm view "${NPM_PACKAGE}@${RELEASE_TAG#v}" version >/dev/null 2>&1 && exit 0
            sleep 10
          done
          exit 1
      - name: Install the published package globally
        shell: bash
        run: npm install --global "${NPM_PACKAGE}@${RELEASE_TAG#v}"
      - name: Verify the installed launcher and portable payload
        shell: bash
        run: |
          set -euo pipefail
          pulsetray --version | grep "${RELEASE_TAG#v}"
          pulsetray --help | grep "Uso:"
